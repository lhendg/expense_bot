<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Add Expense</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #1c1c1e);
    --hint: var(--tg-theme-hint-color, #8e8e93);
    --link: var(--tg-theme-link-color, #2481cc);
    --button: var(--tg-theme-button-color, #2481cc);
    --button-text: var(--tg-theme-button-text-color, #ffffff);
    --secondary-bg: var(--tg-theme-secondary-bg-color, #f2f2f7);
    --accent: #ff8a3d;
    --danger: #ff3b30;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px 16px 100px;
  }

  h1 {
    font-size: 20px;
    font-weight: 700;
    margin: 4px 0 18px;
    letter-spacing: -0.2px;
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--hint);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 6px;
  }

  .input, select, textarea {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid rgba(142,142,147,0.25);
    background: var(--secondary-bg);
    color: var(--text);
    font-size: 16px;
    appearance: none;
    -webkit-appearance: none;
    outline: none;
  }

  textarea {
    font-family: inherit;
    resize: vertical;
  }

  select {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' stroke='%238e8e93' stroke-width='1.5' fill='none' fill-rule='evenodd'/></svg>");
    background-repeat: no-repeat;
    background-position: right 14px center;
    padding-right: 32px;
  }

  .amount-row {
    display: flex;
    align-items: center;
    background: #1c1c1e;
    border-radius: 12px;
    border: 1px solid rgba(142,142,147,0.25);
    overflow: hidden;
  }

  .amount-row .currency {
    padding: 0 0 0 14px;
    color: #ffffff;
    font-size: 16px;
    font-weight: 600;
  }

  .amount-row input {
    border: none;
    background: transparent;
    flex: 1;
    font-size: 22px;
    font-weight: 700;
    padding: 12px 14px;
    color: #ffffff;
  }
  .amount-row input:focus { outline: none; }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--secondary-bg);
    border: 1.5px solid rgba(142,142,147,0.25);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }

  .chip.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .chip.add-new {
    color: var(--link);
    border-style: dashed;
  }

  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: var(--bg);
    border-top: 1px solid rgba(142,142,147,0.15);
  }

  .submit-btn {
    width: 100%;
    padding: 15px;
    border-radius: 14px;
    border: none;
    background: var(--button);
    color: var(--button-text);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.2px;
    transition: background 0.15s ease, transform 0.1s ease;
  }

  .submit-btn:active {
    transform: scale(0.97);
  }

  .submit-btn.submitting {
    background: #34c759;
    pointer-events: none;
  }

  .submit-btn:disabled {
    opacity: 0.5;
  }

  .error-text {
    color: var(--danger);
    font-size: 13px;
    margin-top: 6px;
    display: none;
  }

  .new-label-input {
    display: none;
    margin-top: 8px;
  }
</style>
</head>
<body>

  <h1>New expense</h1>

  <div class="field">
    <label for="amount">Amount</label>
    <div class="amount-row">
      <span class="currency" id="currencyLabel">₱</span>
      <input id="amount" type="number" inputmode="decimal" step="0.01" min="0" placeholder="0.00" autofocus>
    </div>
    <div class="error-text" id="amountError">Enter an amount greater than 0.</div>
  </div>

  <div class="field">
    <label for="description">Description</label>
    <input class="input" id="description" type="text" placeholder="e.g. Grab to office, Lunch with team">
  </div>

  <div class="field">
    <label for="date">Date</label>
    <input class="input" id="date" type="date">
  </div>

  <div class="field">
    <label for="paymentMethod">Payment method</label>
    <select class="input" id="paymentMethod"></select>
  </div>

  <div class="field">
    <label>Labels</label>
    <div class="chips" id="labelChips"></div>
    <input class="input new-label-input" id="newLabelInput" type="text" placeholder="Type a new label, press enter">
  </div>

  <div class="field">
    <label for="notes">Notes <span style="text-transform:none; font-weight:400;">(optional)</span></label>
    <textarea class="input" id="notes" rows="3" placeholder="Any extra detail you want to remember"></textarea>
  </div>

  <div class="footer">
    <button class="submit-btn" id="submitBtn">Add expense</button>
  </div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  // ---- CUSTOMIZE THESE LISTS ----
  const PAYMENT_METHODS = ["Cash", "GCash", "Credit Card", "Debit Card", "Bank Transfer"];
  const DEFAULT_LABELS = ["Food", "Transport", "Groceries", "Bills", "Shopping", "Health", "Entertainment", "Other"];
  const CURRENCY = "₱";
  // --------------------------------

  document.getElementById("currencyLabel").textContent = CURRENCY;

  // Date default = today, local time
  const dateInput = document.getElementById("date");
  function setDateOffset(daysAgo) {
    const d = new Date();
    d.setDate(d.getDate() + daysAgo);
    dateInput.value = d.toISOString().slice(0, 10);
  }
  setDateOffset(0);

  // Payment method dropdown
  const PAYMENT_DEFAULT = "Credit Card";
  const paymentSelectEl = document.getElementById("paymentMethod");
  PAYMENT_METHODS.forEach(method => {
    const opt = document.createElement("option");
    opt.value = method;
    opt.textContent = method;
    paymentSelectEl.appendChild(opt);
  });
  paymentSelectEl.value = PAYMENT_METHODS.includes(PAYMENT_DEFAULT) ? PAYMENT_DEFAULT : PAYMENT_METHODS[0];

  // Labels chips (multi select + add new)
  let labels = [...DEFAULT_LABELS];
  let selectedLabels = new Set();
  const labelChipsEl = document.getElementById("labelChips");
  const newLabelInput = document.getElementById("newLabelInput");

  function renderLabelChips() {
    labelChipsEl.innerHTML = "";
    labels.forEach(label => {
      const chip = document.createElement("div");
      chip.className = "chip" + (selectedLabels.has(label) ? " selected" : "");
      chip.textContent = label;
      chip.addEventListener("click", () => {
        if (selectedLabels.has(label)) {
          selectedLabels.delete(label);
        } else {
          selectedLabels.add(label);
        }
        renderLabelChips();
      });
      labelChipsEl.appendChild(chip);
    });
    const addChip = document.createElement("div");
    addChip.className = "chip add-new";
    addChip.textContent = "+ Add label";
    addChip.addEventListener("click", () => {
      newLabelInput.style.display = "block";
      newLabelInput.focus();
    });
    labelChipsEl.appendChild(addChip);
  }
  renderLabelChips();

  newLabelInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      const val = newLabelInput.value.trim();
      if (val && !labels.includes(val)) {
        labels.push(val);
        selectedLabels.add(val);
      } else if (val) {
        selectedLabels.add(val);
      }
      newLabelInput.value = "";
      newLabelInput.style.display = "none";
      renderLabelChips();
    }
  });

  // Submit
  const amountInput = document.getElementById("amount");
  const amountError = document.getElementById("amountError");
  const descriptionInput = document.getElementById("description");
  const notesInput = document.getElementById("notes");
  const submitBtn = document.getElementById("submitBtn");

  function buildPayload() {
    return {
      date: dateInput.value,
      description: descriptionInput.value.trim(),
      amount: parseFloat(amountInput.value),
      payment_method: paymentSelectEl.value,
      labels: Array.from(selectedLabels),
      notes: notesInput.value.trim()
    };
  }

  function validate() {
    const amt = parseFloat(amountInput.value);
    if (!amt || amt <= 0) {
      amountError.style.display = "block";
      return false;
    }
    amountError.style.display = "none";
    return true;
  }

  function submit() {
    if (!validate()) return;
    const payload = buildPayload();

    if (tg && tg.sendData) {
      submitBtn.classList.add("submitting");
      submitBtn.textContent = "Adding...";
      if (tg.HapticFeedback) {
        tg.HapticFeedback.impactOccurred("medium");
      }
      try {
        tg.sendData(JSON.stringify(payload));
        setTimeout(() => tg.close(), 150);
      } catch (err) {
        submitBtn.classList.remove("submitting");
        submitBtn.textContent = "Add expense";
        alert("Couldn't send: " + (err && err.message ? err.message : err));
      }
    } else {
      // Fallback for testing in a regular browser
      alert("Payload (would be sent to bot):\n" + JSON.stringify(payload, null, 2));
    }
  }

  submitBtn.addEventListener("click", submit);

  if (tg) {
    tg.onEvent("mainButtonClicked", submit);
  }
</script>
</body>
</html>
